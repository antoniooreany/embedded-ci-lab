name: Yocto Lab Integration Sanity Check
steps:
  - name: Validate Yocto Lab Metadata
    type: yocto_validate_artifacts
    params:
      # We assume artifacts are cloned/built in a parent directory
      artifacts_root: "${ARTIFACTS_ROOT:-../yocto-lab}"
      expected:
        configurations:
          - "samples/local.conf"
          - "samples/bblayers.conf"
          - "conf-examples/local.conf"
          - "conf-examples/bblayers.conf"
          - "templates/local.conf"
          - "templates/bblayers.conf"
        custom_layers: ["meta-*/conf/layer.conf"]
        sample_recipes: ["*_*.bb"]
        # This requirement is designed to trigger a FAIL result for demonstration.
        # It shows how the CI gate blocks the build if corporate security standards are not met.
        mandatory_security_layer: ["meta-security/conf/layer.conf"]

  - name: Environment Report
    command: echo "Yocto Lab metadata validated. Environment is ready for BitBake build."
