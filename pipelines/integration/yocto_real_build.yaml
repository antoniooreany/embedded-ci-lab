name: "Real Yocto Build Pipeline"
steps:
  - name: "[Build] Full Yocto Build Cycle"
    # Consolidate all steps into a single bash session to ensure environment persistence and avoid CRLF issues
    command: |
      /bin/bash -c "
      set -ex
      POKY_ROOT=${HOME}/yocto-work/poky
      BUILD_DIR=\$POKY_ROOT/build
      BBLAYERS_CONF=\$BUILD_DIR/conf/bblayers.conf
      LAYER_PATH=${HOME}/yocto-work/yocto-lab/meta-yocto-lab
      
      # 1. Initialize environment
      if [ ! -f \"\$BBLAYERS_CONF\" ]; then
          echo 'Initializing fresh build directory...'
          source \$POKY_ROOT/oe-init-build-env \$BUILD_DIR
      else
          # Ensure environment is sourced even if build dir exists
          source \$POKY_ROOT/oe-init-build-env \$BUILD_DIR
      fi
      
      # 2. Inject custom layer
      if [ -d \"\$LAYER_PATH\" ]; then
          grep -q \"\$LAYER_PATH\" \"\$BBLAYERS_CONF\" || echo \"BBLAYERS += \\\"\$LAYER_PATH\\\"\" >> \"\$BBLAYERS_CONF\"
          echo 'Layers injected successfully'
      else
          echo \"Error: Layer path not found at \$LAYER_PATH\"
          exit 1
      fi
      
      # 3. Execute build
      bitbake core-image-minimal
      "
    timeout_seconds: 28800
    memory_limit_mb: 24576

  - name: "[Post-build] Verify Artifacts"
    type: "yocto_validate_artifacts"
    params:
      # Validates that kernel and rootfs artifacts are generated in the build directory
      artifacts_root: "${HOME}/yocto-work/poky/build/tmp/deploy/images/qemux86-64"
      expected:
        kernel: ["bzImage*"]
        rootfs: ["core-image-minimal-*.rootfs.ext4"]
