name: "Real Yocto Build Pipeline"
steps:
  - name: "[Pre-build] Inject Metadata Layers"
    # Adds the custom meta-layers from yocto-lab to bblayers.conf
    command: |
      cd ~/yocto-work/poky/build
      LAYER_PATH=$(realpath ../../yocto-lab)
      grep -q "$LAYER_PATH" conf/bblayers.conf || echo "BBLAYERS += \"$LAYER_PATH\"" >> conf/bblayers.conf
      echo "Layers injected into bblayers.conf"

  - name: "[Build] BitBake core-image-minimal"
    # Initializes environment and executes a full BitBake build
    command: |
      cd ~/yocto-work/poky
      source oe-init-build-env build
      bitbake core-image-minimal
    timeout_seconds: 28800 # 8 hours for initial build
    memory_limit_mb: 24576 # 24 GB RAM limit (safe for 32GB host)

  - name: "[Post-build] Verify Artifacts"
    type: "yocto_validate_artifacts"
    params:
      # Validates that kernel and rootfs artifacts are generated in the build directory
      artifacts_root: "~/yocto-work/poky/build/tmp/deploy/images/qemuarm"
      expected:
        kernel: ["bzImage*"]
        rootfs: ["core-image-minimal-*.wic.gz"]
