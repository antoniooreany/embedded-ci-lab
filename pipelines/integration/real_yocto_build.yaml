name: "Real Yocto Build Pipeline"
steps:
  - name: "[Pre-build] Inject Metadata Layers"
    # Single-line command to avoid CRLF issues
    command: /bin/bash -c "cd ${HOME}/yocto-work/poky/build; LAYER_PATH=${HOME}/yocto-work/yocto-lab/meta-yocto-lab; grep -q \"$LAYER_PATH\" conf/bblayers.conf || echo \"BBLAYERS += \\\"$LAYER_PATH\\\"\" >> conf/bblayers.conf; echo 'Layers injected into bblayers.conf'"

  - name: "[Build] BitBake core-image-minimal"
    # Single-line command to avoid CRLF issues, with diagnostic ls
    command: /bin/bash -c "set -e; cd ${HOME}/yocto-work/poky; ls -F oe-init-build-env; source ./oe-init-build-env build; bitbake core-image-minimal"
    timeout_seconds: 28800 # 8 hours for initial build
    memory_limit_mb: 24576 # 24 GB RAM limit (safe for 32GB host)

  - name: "[Post-build] Verify Artifacts"
    type: "yocto_validate_artifacts"
    params:
      # Validates that kernel and rootfs artifacts are generated in the build directory
      artifacts_root: "${HOME}/yocto-work/poky/build/tmp/deploy/images/qemux86-64"
      expected:
        kernel: ["bzImage*"]
        rootfs: ["core-image-minimal-*.rootfs.ext4"]
