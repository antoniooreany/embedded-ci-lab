name: "Real Yocto Build Pipeline"
steps:
  - name: "[Pre-build] Initialize Environment & Inject Metadata Layers"
    # Use generic paths anchored to the home directory for portability
    command: |
      /bin/bash -c "
      set -ex
      cd ~ && cd yocto-work/poky/build
      BBLAYERS_CONF=conf/bblayers.conf
      LAYER_PATH=~/yocto-work/yocto-lab/meta-yocto-lab
      grep -q \"$LAYER_PATH\" \"$BBLAYERS_CONF\" || echo \"BBLAYERS += \\\"$LAYER_PATH\\\"\" >> \"$BBLAYERS_CONF\"
      echo 'Layers injected successfully'
      "

  - name: "[Build] BitBake core-image-minimal"
    # Use generic paths for reliable environment initialization
    command: |
      /bin/bash -c "
      set -ex
      cd ~ && cd yocto-work/poky
      source ./oe-init-build-env build
      bitbake core-image-minimal
      "
    timeout_seconds: 28800
    memory_limit_mb: 24576

  - name: "[Post-build] Verify Artifacts"
    type: "yocto_validate_artifacts"
    params:
      # Validates that kernel and rootfs artifacts are generated in the build directory
      artifacts_root: "~/yocto-work/poky/build/tmp/deploy/images/qemux86-64"
      expected:
        kernel: ["bzImage*"]
        rootfs: ["core-image-minimal-*.rootfs.ext4"]
