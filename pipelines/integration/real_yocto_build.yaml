name: "Real Yocto Build Pipeline"
steps:
  - name: "[Pre-build] Initialize Environment & Inject Metadata Layers"
    command: |
      /bin/bash -c "
      set -ex
      BBLAYERS_CONF=/home/anton/yocto-work/poky/build/conf/bblayers.conf
      LAYER_PATH=/home/anton/yocto-work/yocto-lab/meta-yocto-lab
      grep -q \"$LAYER_PATH\" \"$BBLAYERS_CONF\" || echo \"BBLAYERS += \\\"$LAYER_PATH\\\"\" >> \"$BBLAYERS_CONF\"
      "

  - name: "[Build] BitBake core-image-minimal"
    command: |
      /bin/bash -c "
      set -ex
      POKY_ROOT=/home/anton/yocto-work/poky
      echo 'Content of POKY_ROOT:' && ls -la \$POKY_ROOT
      source \$POKY_ROOT/oe-init-build-env \$POKY_ROOT/build
      bitbake core-image-minimal
      "
    timeout_seconds: 28800
    memory_limit_mb: 24576

  - name: "[Post-build] Verify Artifacts"
    type: "yocto_validate_artifacts"
    params:
      artifacts_root: "/home/anton/yocto-work/poky/build/tmp/deploy/images/qemux86-64"
      expected:
        kernel: ["bzImage*"]
        rootfs: ["core-image-minimal-*.rootfs.ext4"]
